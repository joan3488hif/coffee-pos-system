```html
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Coffee POS</title>

<style>

:root{
--bg:#F6F1EB;
--card:#FFFFFF;
--brown:#6F4E37;
--dark:#3B2B20;
--light:#C8B6A6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;
}

body{
background:var(--bg);
padding-bottom:90px;
}

.header{
padding:30px 24px;
}

.title{
font-size:34px;
font-weight:700;
color:var(--dark);
}

.subtitle{
margin-top:8px;
color:#8a7b6f;
}

.cards{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
220px,
1fr
));

gap:16px;

padding:0 24px;
}

.card{

background:var(--card);

padding:24px;

border-radius:22px;

box-shadow:
0 8px 24px
rgba(
0,
0,
0,
0.06
);

}

.card-label{

font-size:14px;

color:#888;
}

.card-value{

font-size:36px;

font-weight:700;

margin-top:10px;

color:var(--dark);
}

.quick{

padding:24px;
}

.quick h2{

margin-bottom:18px;

color:var(--dark);
}

.quick-grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
160px,
1fr
));

gap:16px;

}

.action{

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

height:120px;

background:white;

text-decoration:none;

border-radius:22px;

color:var(--dark);

box-shadow:
0 8px 24px
rgba(
0,
0,
0,
0.06
);

font-size:18px;

font-weight:600;
}

.icon{

font-size:32px;

margin-bottom:10px;
}

.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:72px;

background:white;

display:flex;

justify-content:space-around;

align-items:center;

box-shadow:
0 -2px 20px
rgba(
0,
0,
0,
0.08
);
}

.bottom-nav a{

text-decoration:none;

color:var(--brown);

font-size:14px;

font-weight:600;

display:flex;

flex-direction:column;

align-items:center;
}

.bottom-nav span{

font-size:24px;

margin-bottom:4px;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
☕ Coffee POS
</div>

<div class="subtitle">
今日營運概況
</div>

</div>

<div class="cards">

<div class="card">

<div class="card-label">
今日營收
</div>

<div class="card-value" id="sales">
NT$0
</div>

</div>

<div class="card">

<div class="card-label">
訂單數量
</div>

<div class="card-value" id="orders">
0
</div>

</div>

<div class="card">

<div class="card-label">
商品數量
</div>

<div class="card-value" id="products">
0
</div>

</div>

</div>

<div class="quick">

<h2>
快速操作
</h2>

<div class="quick-grid">

<a
href="pos.html"
class="action">

<div class="icon">
🛒
</div>

開始收銀

</a>

<a
href="products.html"
class="action">

<div class="icon">
📦
</div>

商品管理

</a>

<a
href="orders.html"
class="action">

<div class="icon">
📋
</div>

訂單管理

</a>

</div>

</div>

<div class="bottom-nav">

<a href="index.html">
<span>🏠</span>
首頁
</a>

<a href="pos.html">
<span>🛒</span>
收銀
</a>

<a href="products.html">
<span>📦</span>
商品
</a>

<a href="orders.html">
<span>📋</span>
訂單
</a>

</div>

<script>

const products =
JSON.parse(
localStorage.getItem(
"products"
)
) || [];

const orders =
JSON.parse(
localStorage.getItem(
"orders"
)
) || [];

let sales = 0;

orders.forEach(order=>{

sales += order.total;

});

document.getElementById(
"sales"
).innerHTML =
"NT$" +
sales.toLocaleString();

document.getElementById(
"orders"
).innerHTML =
orders.length;

document.getElementById(
"products"
).innerHTML =
products.length;

</script>

</body>
</html>
```
