<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Coffee POS Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#1f2937;
padding:20px;
}

.logo{
color:white;
font-size:24px;
font-weight:bold;
margin-bottom:30px;
}

.menu a{
display:block;
padding:15px;
margin-bottom:10px;
background:#374151;
border-radius:8px;
text-decoration:none;
color:white;
}

.menu a:hover{
background:#4b5563;
}

.content{
margin-left:250px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card-title{
font-size:16px;
color:#666;
}

.card-value{
font-size:36px;
font-weight:bold;
margin-top:10px;
}

.quick{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.quick a{
display:block;
padding:20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
text-align:center;
font-size:18px;
}

.quick a:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
☕ Coffee POS
</div>

<div class="menu">
<a href="index.html">Dashboard</a>
<a href="pos.html">POS收銀</a>
<a href="products.html">商品管理</a>
<a href="orders.html">訂單管理</a>
</div>

</div>

<div class="content">

<h1>儀表板</h1>

<div class="cards">

<div class="card">
<div class="card-title">今日營收</div>
<div class="card-value" id="sales">NT$0</div>
</div>

<div class="card">
<div class="card-title">訂單數量</div>
<div class="card-value" id="orders">0</div>
</div>

<div class="card">
<div class="card-title">商品數量</div>
<div class="card-value" id="products">0</div>
</div>

</div>

<div class="quick">

<a href="pos.html">
🛒 開始收銀
</a>

<a href="products.html">
📦 商品管理
</a>

<a href="orders.html">
📋 訂單管理
</a>

</div>

</div>

<script>

const products =
JSON.parse(
localStorage.getItem("products")
) || [];

const orders =
JSON.parse(
localStorage.getItem("orders")
) || [];

let totalSales = 0;

orders.forEach(order => {
totalSales += order.total;
});

document.getElementById("sales").innerHTML =
"NT$" + totalSales.toLocaleString();

document.getElementById("orders").innerHTML =
orders.length;

document.getElementById("products").innerHTML =
products.length;

</script>

</body>
</html>
