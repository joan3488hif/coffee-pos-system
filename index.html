<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Coffee POS System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#1f2937;
color:white;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
}

.menu a{
display:block;
padding:15px;
margin-bottom:10px;
background:#374151;
border-radius:8px;
color:white;
text-decoration:none;
}

.menu a:hover{
background:#4b5563;
}

.content{
flex:1;
padding:30px;
overflow:auto;
}

.product{
width:100%;
padding:20px;
margin-bottom:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

.product:hover{
background:#1d4ed8;
}

.cart-item{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.total-box{
margin-top:20px;
padding:20px;
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">
☕ Coffee POS
</div>

<div class="menu">
<a href="#">POS收銀</a>
<a href="#">商品管理</a>
<a href="#">庫存管理</a>
<a href="#">會員管理</a>
<a href="#">訂單管理</a>
<a href="#">財務報表</a>
</div>

</div>

<div class="content">

<h1>POS 收銀</h1>

<br>

<div style="display:flex;gap:30px;">

<div style="flex:2;">

<h2>商品列表</h2>

<br>

<button class="product" onclick="addItem('美式咖啡',120)">
☕ 美式咖啡 NT$120
</button>

<button class="product" onclick="addItem('拿鐵',150)">
🥛 拿鐵 NT$150
</button>

<button class="product" onclick="addItem('卡布奇諾',150)">
☕ 卡布奇諾 NT$150
</button>

<button class="product" onclick="addItem('濾掛咖啡',300)">
📦 濾掛咖啡 NT$300
</button>

</div>

<div style="flex:1;">

<h2>購物車</h2>

<br>

<div id="cart"></div>

<div class="total-box">

<h2 id="total">
總金額：NT$0
</h2>

</div>

</div>

</div>

</div>

</div>

<script>

let total = 0;

function addItem(name,price){

const cart =
document.getElementById("cart");

cart.innerHTML += `
<div class="cart-item">
${name} - NT$${price}
</div>
`;

total += price;

document.getElementById("total").innerHTML =
`總金額：NT$${total}`;
}

</script>

</body>
</html>
