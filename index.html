<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Coffee POS</title>

<style>

:root{
--bg:#F6F1EB;
--card:#FFFFFF;
--brown:#6F4E37;
--dark:#3B2B20;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:var(--bg);
padding-bottom:90px;
}

.header{
padding:30px 24px;
}

.title{
font-size:34px;
font-weight:700;
color:var(--dark);
}

.subtitle{
margin-top:8px;
color:#8A7B6F;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
padding:0 24px;
}

.card{
background:white;
padding:24px;
border-radius:22px;
box-shadow:0 8px 24px rgba(0,0,0,.06);
}

.card-label{
font-size:14px;
color:#888;
}

.card-value{
font-size:36px;
font-weight:700;
margin-top:10px;
color:var(--dark);
}

.section{
padding:24px;
}

.section h2{
margin-bottom:16px;
color:var(--dark);
}

.order-card{
background:white;
padding:18px;
border-radius:18px;
margin-bottom:12px;
box-shadow:0 8px 24px rgba(0,0,0,.05);
}

.order-no{
font-weight:700;
color:var(--dark);
}

.order-date{
margin-top:8px;
font-size:14px;
color:#8A7B6F;
}

.order-total{
margin-top:8px;
font-size:22px;
font-weight:700;
color:var(--dark);
}

.empty{
background:white;
padding:20px;
border-radius:18px;
text-align:center;
color:#8A7B6F;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:72px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -2px 20px rgba(0,0,0,.08);
}

.bottom-nav a{
text-decoration:none;
color:var(--brown);
font-size:14px;
font-weight:600;
display:flex;
flex-direction:column;
align-items:center;
}

.bottom-nav span{
font-size:24px;
margin-bottom:4px;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
☕ Coffee POS
</div>

<div class="subtitle">
今天的營運概況
</div>

</div>

<div class="cards">

<div class="card">

<div class="card-label">
今日營收
</div>

<div class="card-value" id="sales">
NT$0
</div>

</div>

<div class="card">

<div class="card-label">
訂單數量
</div>

<div class="card-value" id="orders">
0
</div>

</div>

<div class="card">

<div class="card-label">
商品數量
</div>

<div class="card-value" id="products">
0
</div>

</div>

</div>

<div class="section">

<h2>
最近訂單
</h2>

<div id="recentOrders"></div>

</div>

<div class="bottom-nav">

<a href="index.html">
<span>🏠</span>
首頁
</a>

<a href="pos.html">
<span>🛒</span>
收銀
</a>

<a href="products.html">
<span>📦</span>
商品
</a>

<a href="orders.html">
<span>📋</span>
訂單
</a>

</div>

<script>

const products =
JSON.parse(localStorage.getItem("products"))
|| [];

const orders =
JSON.parse(localStorage.getItem("orders"))
|| [];

let sales = 0;

orders.forEach(order=>{
sales += order.total;
});

document.getElementById("sales").innerHTML =
"NT$" + sales.toLocaleString();

document.getElementById("orders").innerHTML =
orders.length;

document.getElementById("products").innerHTML =
products.length;

const recent =
document.getElementById("recentOrders");

if(orders.length===0){

recent.innerHTML = `
<div class="empty">
目前尚無訂單
</div>
`;

}else{

const latest =
orders.slice(-5).reverse();

latest.forEach(order=>{

recent.innerHTML += `

<div class="order-card">

<div class="order-no">
${order.orderNo}
</div>

<div class="order-date">
${order.date}
</div>

<div class="order-total">
NT$${order.total}
</div>

</div>

`;

});

}

</script>

</body>
</html>
```
