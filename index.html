<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Coffee POS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
sans-serif;
}

body{

background:#F8F5F1;

}

.sidebar{

position:fixed;

left:0;

top:0;

width:260px;

height:100vh;

background:#4A3525;

padding:30px;

}

.logo{

font-size:28px;

font-weight:700;

color:white;

margin-bottom:40px;

}

.menu a{

display:block;

padding:18px;

margin-bottom:14px;

border-radius:14px;

background:
rgba(
255,
255,
255,
0.08
);

text-decoration:none;

color:white;

font-size:18px;

}

.menu a:hover{

background:
rgba(
255,
255,
255,
0.16
);

}

.content{

margin-left:260px;

padding:40px;

}

.title{

font-size:40px;

font-weight:700;

color:#3B2B20;

}

.subtitle{

color:#7A6B5D;

margin-top:8px;

}

.cards{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
260px,
1fr
));

gap:20px;

margin-top:35px;

}

.card{

background:white;

padding:28px;

border-radius:22px;

box-shadow:
0 8px 30px
rgba(
80,
60,
40,
0.08
);

}

.label{

font-size:15px;

color:#8A7A6A;

}

.value{

font-size:42px;

margin-top:10px;

font-weight:700;

color:#3B2B20;

}

.quick{

margin-top:40px;

}

.quick-grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
230px,
1fr
));

gap:18px;

margin-top:20px;

}

.action{

padding:26px;

border-radius:20px;

background:
linear-gradient(
135deg,
#8A6546,
#B1825C
);

color:white;

text-decoration:none;

font-size:22px;

text-align:center;

}

.action:hover{

transform:
translateY(-4px);

transition:.2s;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

☕ Coffee POS

</div>

<div class="menu">

<a href="index.html">
首頁
</a>

<a href="pos.html">
收銀
</a>

<a href="products.html">
商品
</a>

<a href="orders.html">
訂單
</a>

</div>

</div>

<div class="content">

<div class="title">

午安 ☕

</div>

<div class="subtitle">

今天的咖啡店營運狀況

</div>

<div class="cards">

<div class="card">

<div class="label">

今日營收

</div>

<div
class="value"
id="sales">

NT$0

</div>

</div>

<div class="card">

<div class="label">

訂單數量

</div>

<div
class="value"
id="orders">

0

</div>

</div>

<div class="card">

<div class="label">

商品數量

</div>

<div
class="value"
id="products">

0

</div>

</div>

</div>

<div class="quick">

<h2>

快速操作

</h2>

<div class="quick-grid">

<a
class="action"
href="pos.html">

🛒
開始收銀

</a>

<a
class="action"
href="products.html">

📦
商品管理

</a>

<a
class="action"
href="orders.html">

📋
查看訂單

</a>

</div>

</div>

</div>

<script>

const products =
JSON.parse(
localStorage.getItem(
"products"
)
) || [];

const orders =
JSON.parse(
localStorage.getItem(
"orders"
)
) || [];

let sales = 0;

orders.forEach(order=>{

sales +=
order.total;

});

document
.getElementById(
"sales"
)
.innerHTML =
"NT$"+
sales
.toLocaleString();

document
.getElementById(
"orders"
)
.innerHTML =
orders.length;

document
.getElementById(
"products"
)
.innerHTML =
products.length;

</script>

</body>

</html>
