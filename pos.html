<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Coffee POS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
sans-serif;
}

body{
background:#F8F5F1;
}

.header{

background:#4A3525;

padding:28px 32px;

color:white;

font-size:30px;

font-weight:700;

}

.container{

display:flex;

gap:28px;

padding:30px;

}

.products{

flex:2;

}

.products h2{

color:#3B2B20;

margin-bottom:18px;

}

.productList{

display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(
260px,
1fr
));

gap:18px;

}

.product{

background:white;

border:none;

padding:28px;

border-radius:22px;

cursor:pointer;

text-align:left;

box-shadow:
0 8px 25px
rgba(
80,
60,
40,
0.08
);

}

.product:hover{

transform:
translateY(-3px);

transition:.2s;

}

.product-name{

font-size:22px;

font-weight:700;

color:#3B2B20;

}

.product-price{

margin-top:10px;

font-size:18px;

color:#8A6546;

}

.cart{

width:380px;

background:white;

padding:26px;

border-radius:26px;

height:fit-content;

position:sticky;

top:20px;

box-shadow:
0 8px 30px
rgba(
80,
60,
40,
0.08
);

}

.cart h2{

color:#3B2B20;

margin-bottom:20px;

}

.cart-item{

display:flex;

justify-content:
space-between;

align-items:center;

padding:14px 0;

border-bottom:
1px solid #eee;

}

.item-name{

font-weight:600;

}

.item-price{

color:#8A6546;

font-size:15px;

margin-top:4px;

}

.delete-btn{

background:#EFE6DC;

color:#4A3525;

border:none;

padding:8px 14px;

border-radius:10px;

cursor:pointer;

}

.total{

font-size:32px;

font-weight:700;

margin-top:20px;

color:#3B2B20;

}

.action{

width:100%;

padding:18px;

border:none;

border-radius:16px;

font-size:18px;

margin-top:14px;

cursor:pointer;

}

.checkout{

background:#8A6546;

color:white;

}

.clear{

background:#E9DED1;

color:#4A3525;

}

</style>

</head>

<body>

<div class="header">

☕ Coffee POS

<div style="margin-top:15px;">

<a href="index.html" style="color:white;margin-right:15px;">
首頁
</a>

<a href="pos.html" style="color:white;margin-right:15px;">
收銀
</a>

<a href="products.html" style="color:white;margin-right:15px;">
商品
</a>

<a href="orders.html" style="color:white;">
訂單
</a>

</div>

</div>

<div class="container">

<div class="products">

<h2>

今日商品

</h2>

<div
class="productList"
id="productList">

</div>

</div>

<div class="cart">

<h2>

🛒 本次訂單

</h2>

<div id="cartList">

</div>

<div
class="total"
id="total">

NT$0

</div>

<button
class="action checkout"
onclick="checkout()">

完成結帳

</button>

<button
class="action clear"
onclick="clearCart()">

清空

</button>

</div>

</div>

<script>

let cart=[];

let products=
JSON.parse(
localStorage.getItem(
"products"
)
)||[];

if(products.length===0){

products=[

{
name:"美式咖啡",
price:120
},

{
name:"拿鐵",
price:150
},

{
name:"卡布奇諾",
price:150
}

];

localStorage.setItem(
"products",
JSON.stringify(
products
)
);

}

renderProducts();

function renderProducts(){

const container=
document.getElementById(
"productList"
);

container.innerHTML="";

products.forEach(p=>{

container.innerHTML+=`

<button
class="product"

onclick="
addItem(
'${p.name}',
${p.price}
)
">

<div
class="product-name">

☕

${p.name}

</div>

<div
class="product-price">

NT$

${p.price}

</div>

</button>

`;

});

}

function addItem(
name,
price
){

const exist=
cart.find(
i=>
i.name===name
);

if(exist){

exist.qty++;

}else{

cart.push({

name,

price,

qty:1

});

}

renderCart();

}

function removeItem(
name
){

cart=
cart.filter(
i=>
i.name!==name
);

renderCart();

}

function renderCart(){

const list=
document.getElementById(
"cartList"
);

list.innerHTML="";

let total=0;

cart.forEach(item=>{

total+=
item.price*
item.qty;

list.innerHTML+=`

<div
class="cart-item">

<div>

<div
class="item-name">

${item.name}

</div>

<div
class="item-price">

NT$
${item.price}

×

${item.qty}

</div>

</div>

<button
class="delete-btn"

onclick="
removeItem(
'${item.name}'
)
">

刪除

</button>

</div>

`;

});

document.getElementById(
"total"
).innerHTML=

"NT$"+
total;

}

function clearCart(){

cart=[];

renderCart();

}

function checkout(){

if(
cart.length===0
){

alert(
"購物車是空的"
);

return;

}

let total=0;

cart.forEach(i=>{

total+=
i.price*
i.qty;

});

let orders=
JSON.parse(
localStorage.getItem(
"orders"
)
)||[];

orders.push({

orderNo:
"ORD-"+
Date.now(),

date:
new Date()
.toLocaleString(),

total,

items:cart

});

localStorage.setItem(

"orders",

JSON.stringify(
orders
)

);

alert(
"結帳成功 ☕"
);

cart=[];

renderCart();

}

</script>

</body>

</html>
```
