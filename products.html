<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>商品管理</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.header{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add-btn{
background:#2563eb;
color:white;
}

.delete-btn{
background:#dc2626;
color:white;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-bottom:1px solid #eee;
}

.price{
font-weight:bold;
color:#2563eb;
}

</style>
</head>

<body>

<div class="header">
📦 商品管理
</div>

<div class="card">

<input
id="productName"
placeholder="商品名稱">

<input
id="productPrice"
type="number"
placeholder="售價">

<button
class="add-btn"
onclick="addProduct()">
新增商品
</button>

</div>

<div class="card">

<h2>商品列表</h2>

<br>

<div id="productList"></div>

</div>

<script>

let products =
JSON.parse(
localStorage.getItem("products")
) || [

{name:"美式咖啡",price:120},
{name:"拿鐵",price:150},
{name:"卡布奇諾",price:150},
{name:"濾掛咖啡",price:300}

];

saveProducts();
renderProducts();

function saveProducts(){

localStorage.setItem(
"products",
JSON.stringify(products)
);

}

function addProduct(){

const name =
document.getElementById("productName").value;

const price =
parseInt(
document.getElementById("productPrice").value
);

if(!name || !price){

alert("請輸入商品名稱與價格");

return;
}

products.push({
name,
price
});

saveProducts();

renderProducts();

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";
}

function deleteProduct(index){

if(!confirm("確定刪除？")){
return;
}

products.splice(index,1);

saveProducts();

renderProducts();
}

function renderProducts(){

const list =
document.getElementById("productList");

list.innerHTML="";

products.forEach((item,index)=>{

list.innerHTML += `
<div class="item">

<div>

<div>${item.name}</div>

<div class="price">
NT$${item.price}
</div>

</div>

<button
class="delete-btn"
onclick="deleteProduct(${index})">
刪除
</button>

</div>
`;

});

}

</script>

</body>
</html>
